[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --cov=server
    --cov-report=term-missing
    --cov-report=xml:coverage.xml
    --cov-fail-under=40

# Note: coverage < 100% is expected — the refresh/fetch functions call
# yfinance over the network and are intentionally not covered in unit tests.
